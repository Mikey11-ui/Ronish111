```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
            transition: background 0.5s ease;
        }

        header {
            background: #333;
            color: #fff;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
        }

        nav a:hover {
            color: #00adb5;
        }

        .hero {
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            background: linear-gradient(to right, #00adb5, #007b83);
            color: white;
        }

        .hero button {
            padding: 12px 25px;
            border: none;
            background: white;
            color: #00adb5;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>MySite</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Welcome to My Website</h2>

    <button onclick="alert('Hello!')">Get Started</button>

    <!-- ✅ Upload Background Image -->
    <input type="file" accept="pb.png" onchange="setBackground(event)" style="margin-top:15px; color:white;">
</section>

<footer>
    <p>© 2026 MySite. All rights reserved.</p>
</footer>

<script>
function setBackground(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();

        reader.onload = function(e) {
            document.body.style.background = `url(${e.target.result}) no-repeat center center fixed`;
            document.body.style.backgroundSize = "cover";
        };

        reader.readAsDataURL(file);
    }
}
</script>

</body>
</html>
